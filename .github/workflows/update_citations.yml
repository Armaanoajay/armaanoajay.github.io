name: Update Google Scholar Citations

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run fetch script
        run: |
          python fetch_citations.py

      - name: Commit updated citations.json
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add citations.json
          git diff --quiet || git commit -m "Auto-update citations.json"
          git push
        env:
          # ensure permission to push (the default GITHUB_TOKEN allows push on same repo)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
